<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LHTPi - Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#16213e;padding:2.5rem;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.4);width:100%;max-width:380px}
.login-box h1{color:#e94560;text-align:center;margin-bottom:.5rem;font-size:1.8rem}
.login-box p{color:#8899aa;text-align:center;margin-bottom:1.5rem;font-size:.9rem}
input{width:100%;padding:12px 16px;margin-bottom:1rem;border:1px solid #2a2a4a;border-radius:8px;background:#0f3460;color:#fff;font-size:1rem;outline:none}
input:focus{border-color:#e94560}
button{width:100%;padding:12px;background:#e94560;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600}
button:hover{background:#d63851}
.flash{background:#ff4444;color:#fff;padding:10px;border-radius:8px;margin-bottom:1rem;text-align:center;font-size:.9rem}
</style>
</head>
<body>
<div class="login-box">
<h1>🔐 LHTPi</h1>
<p>Präsentations-Player – Bitte anmelden</p>
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}{% for cat,msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endif %}
{% endwith %}
<form method="post">
<input type="text" name="username" placeholder="Benutzername" required autofocus>
<input type="password" name="password" placeholder="Passwort" required>
<button type="submit">Anmelden</button>
</form>
</div>
</body>
</html>
